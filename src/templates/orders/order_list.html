{% extends "base.html" %}
{% load static %}

{% block title %}Заказы — ООО «Обувь»{% endblock %}
{% block nav_orders %}active{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="mb-0"><i class="bi bi-list-check"></i> Заказы</h2>
  {% if can_manage %}
  <a href="{% url 'orders:order_create' %}" class="btn btn-success">
    <i class="bi bi-plus-lg"></i> Добавить заказ
  </a>
  {% endif %}
</div>

<div class="card mb-3">
  <div class="card-body py-2">
    <div class="row g-2">
      <div class="col-md-6">
        <label class="form-label mb-1 small fw-semibold"><i class="bi bi-search"></i> Поиск</label>
        <input type="search"
               id="order-search"
               name="search"
               class="form-control"
               placeholder="Поиск по номеру, клиенту, статусу, адресу, артикулу..."
               value="{{ current_search }}"
               hx-get="{% url 'orders:order_list' %}"
               hx-trigger="keyup changed delay:300ms, search"
               hx-target="#order-table-container"
               hx-push-url="true">
      </div>
    </div>
  </div>
</div>

<div id="order-table-container">
  {% include "orders/partials/order_table.html" %}
</div>
{% endblock %}
